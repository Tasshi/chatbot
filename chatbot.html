<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>
<style>
  :root {
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: #E3E1DA;
    --text-primary: #1F1E1C;
    --text-secondary: #6B6862;
    --accent: #D97757;
    --accent-hover: #C4653F;
    --accent-text: #FFFFFF;
    --bubble-user: #EDEAE3;
    --code-bg: #EFEDE7;
    --radius: 18px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 760px;
    margin: 0 auto;
  }

  /* Header */
  header {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
  }
  header .brand .dot {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    background: var(--accent);
    flex-shrink: 0;
  }
  header .actions { display: flex; align-items: center; gap: 6px; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--bubble-user); color: var(--text-primary); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* Settings / server row */
  #settings-panel {
    padding: 0 24px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease, padding 0.2s ease;
    flex-shrink: 0;
  }
  #settings-panel.open {
    max-height: 60px;
    padding: 0 24px 12px 24px;
  }
  #settings-panel .row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  #server-url {
    flex: 1;
    font-size: 12px;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-primary);
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 24px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-secondary);
    font-size: 15px;
    max-width: 340px;
    line-height: 1.6;
  }
  .empty-state .dot {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    background: var(--accent);
    margin: 0 auto 16px auto;
  }

  .row-msg { display: flex; }
  .row-msg.user { justify-content: flex-end; }
  .row-msg.assistant { justify-content: flex-start; }

  .msg {
    font-size: 15.5px;
    line-height: 1.65;
    word-wrap: break-word;
  }
  .msg.user {
    max-width: 78%;
    background: var(--bubble-user);
    padding: 10px 16px;
    border-radius: var(--radius);
    white-space: pre-wrap;
  }
  .msg.assistant {
    max-width: 100%;
    padding: 2px 0;
    white-space: pre-wrap;
  }
  .msg.error {
    max-width: 90%;
    background: #FBEAF0;
    border: 1px solid #F0997B;
    color: #712B13;
    padding: 10px 16px;
    border-radius: var(--radius);
  }
  .msg code {
    background: var(--code-bg);
    padding: 1px 6px;
    border-radius: 5px;
    font-family: "SF Mono", Consolas, Menlo, monospace;
    font-size: 0.9em;
  }
  .msg pre {
    background: var(--code-bg);
    padding: 12px 14px;
    border-radius: 10px;
    overflow-x: auto;
    margin: 8px 0;
  }
  .msg pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }
  .msg strong { font-weight: 600; }

  .typing {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }
  .dot-anim { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: bounce 1.2s infinite ease-in-out; }
  .dot-anim:nth-child(2) { animation-delay: 0.15s; }
  .dot-anim:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input */
  #input-area {
    padding: 12px 24px 20px 24px;
    flex-shrink: 0;
  }
  form#input-form {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 8px 8px 8px 18px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  #input {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    padding: 8px 0;
    font-size: 15.5px;
    font-family: inherit;
    background: transparent;
    color: var(--text-primary);
    max-height: 160px;
    line-height: 1.4;
  }
  #input::placeholder { color: var(--text-secondary); }
  #send-btn {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; }
  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 8px;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span class="dot"></span> AI Chatbot</div>
    <div class="actions">
      <button class="icon-btn" id="settings-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
      <button class="icon-btn" id="clear-btn" title="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
      </button>
    </div>
  </header>

  <div id="settings-panel">
    <div class="row">
      <label for="server-url">Server:</label>
      <input id="server-url" type="text" value="" />
    </div>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="dot"></div>
      How can I help you today?
    </div>
  </div>

  <div id="input-area">
    <form id="input-form">
      <textarea id="input" placeholder="Message..." rows="1"></textarea>
      <button id="send-btn" type="submit" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
      </button>
    </form>
    <div class="hint">AI-generated responses may be inaccurate.</div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('empty-state');
  const form = document.getElementById('input-form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsPanel = document.getElementById('settings-panel');
  const serverUrlInput = document.getElementById('server-url');

  // Auto-detect server URL:
  // - Served over http/https (e.g. from Render) -> use that same origin.
  // - Opened locally as a file:// page -> fall back to localhost:8000.
  if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
    serverUrlInput.value = window.location.origin;
  } else {
    serverUrlInput.value = 'http://localhost:8000';
  }

  settingsBtn.addEventListener('click', () => {
    settingsPanel.classList.toggle('open');
  });

  let history = [];

  function autoGrow() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  }
  input.addEventListener('input', () => {
    autoGrow();
    sendBtn.disabled = input.value.trim().length === 0;
  });

  // Minimal, safe markdown-lite renderer: escapes HTML first, then
  // supports ```code blocks```, `inline code`, and **bold**.
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function renderMarkdownLite(text) {
    let escaped = escapeHtml(text);
    escaped = escaped.replace(/```([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`);
    escaped = escaped.replace(/`([^`]+)`/g, '<code>$1</code>');
    escaped = escaped.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    return escaped;
  }

  function addMessage(role, text) {
    emptyState.style.display = 'none';
    const rowDiv = document.createElement('div');
    rowDiv.className = 'row-msg ' + role;
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg ' + role;
    if (role === 'assistant') {
      msgDiv.innerHTML = renderMarkdownLite(text);
    } else {
      msgDiv.textContent = text;
    }
    rowDiv.appendChild(msgDiv);
    messagesEl.appendChild(rowDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msgDiv;
  }

  function showTyping() {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'row-msg assistant';
    rowDiv.id = 'typing-indicator';
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<div class="dot-anim"></div><div class="dot-anim"></div><div class="dot-anim"></div>';
    rowDiv.appendChild(typing);
    messagesEl.appendChild(rowDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage(userText) {
    history.push({ role: 'user', content: userText });
    showTyping();
    sendBtn.disabled = true;

    const serverUrl = serverUrlInput.value.trim().replace(/\/$/, '');

    try {
      const response = await fetch(serverUrl + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      if (!response.ok) {
        const errBody = await response.json().catch(() => ({}));
        throw new Error(errBody.detail || ('Request failed with status ' + response.status));
      }

      const data = await response.json();
      const reply = data.reply || '(no response)';

      hideTyping();
      addMessage('assistant', reply);
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      hideTyping();
      addMessage('error', 'Something went wrong: ' + err.message + '. Is the server running?');
      history.pop();
    } finally {
      sendBtn.disabled = input.value.trim().length === 0;
    }
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    addMessage('user', text);
    input.value = '';
    autoGrow();
    sendBtn.disabled = true;
    sendMessage(text);
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) form.requestSubmit();
    }
  });

  clearBtn.addEventListener('click', () => {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = 'block';
  });
</script>
</body>
</html>
